<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 200" width="1400" height="200">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="40%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1f0f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- Glow for text -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow for circles -->
    <filter id="circleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Green glow for circuits -->
    <filter id="greenGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bannerClip">
      <rect width="1400" height="200"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">

  <!-- Background -->
  <rect width="1400" height="200" fill="url(#bgGrad)"/>

  <!-- Stars scattered -->
  <g fill="white" opacity="0.5">
    <circle cx="50" cy="15" r="0.7"/><circle cx="120" cy="40" r="0.5"/>
    <circle cx="200" cy="8" r="0.8"/><circle cx="280" cy="55" r="0.5"/>
    <circle cx="350" cy="20" r="0.6"/><circle cx="420" cy="170" r="0.7"/>
    <circle cx="500" cy="12" r="0.5"/><circle cx="560" cy="80" r="0.4"/>
    <circle cx="630" cy="185" r="0.6"/><circle cx="700" cy="30" r="0.5"/>
    <circle cx="780" cy="155" r="0.7"/><circle cx="850" cy="22" r="0.5"/>
    <circle cx="920" cy="90" r="0.4"/><circle cx="1000" cy="10" r="0.8"/>
    <circle cx="1060" cy="170" r="0.5"/><circle cx="1130" cy="35" r="0.6"/>
    <circle cx="1200" cy="130" r="0.5"/><circle cx="1280" cy="18" r="0.7"/>
    <circle cx="1350" cy="60" r="0.4"/><circle cx="80" cy="130" r="0.6"/>
    <circle cx="160" cy="100" r="0.5"/><circle cx="240" cy="165" r="0.4"/>
    <circle cx="320" cy="145" r="0.7"/><circle cx="460" cy="135" r="0.5"/>
    <circle cx="610" cy="50" r="0.4"/><circle cx="720" cy="175" r="0.6"/>
    <circle cx="880" cy="145" r="0.5"/><circle cx="970" cy="175" r="0.4"/>
    <circle cx="1100" cy="95" r="0.6"/><circle cx="1320" cy="150" r="0.5"/>
  </g>

  <!-- ═══ CIRCUIT TRACES RIGHT SIDE ═══ -->
  <g stroke="#1a6b2a" stroke-width="1.2" fill="none" opacity="0.75" filter="url(#greenGlow)">
    <!-- Main horizontal trunk right -->
    <line x1="900" y1="40" x2="1400" y2="40"/>
    <!-- Branches up from trunk -->
    <polyline points="1000,40 1000,10 1060,10"/>
    <polyline points="1100,40 1100,10 1200,10 1200,25"/>
    <polyline points="1250,40 1250,15 1350,15"/>
    <polyline points="1320,40 1320,0"/>
    <!-- Branches down from trunk -->
    <polyline points="950,40 950,80 1020,80 1020,110"/>
    <polyline points="1080,40 1080,70 1150,70 1150,100 1250,100"/>
    <polyline points="1180,40 1180,60 1300,60 1300,90 1380,90"/>
    <polyline points="1350,40 1350,75"/>
    <!-- Second horizontal -->
    <line x1="1000" y1="110" x2="1400" y2="110"/>
    <polyline points="1050,110 1050,140 1120,140"/>
    <polyline points="1200,110 1200,140 1300,140 1300,165"/>
    <polyline points="1320,110 1320,160 1400,160"/>
    <!-- Third horizontal bottom -->
    <line x1="1100" y1="175" x2="1400" y2="175"/>
    <polyline points="1150,175 1150,155 1220,155"/>
    <polyline points="1280,175 1280,155"/>
  </g>
  <!-- Circuit nodes right -->
  <g fill="#1a6b2a" opacity="0.8">
    <circle cx="1000" cy="40" r="3"/><circle cx="1100" cy="40" r="3"/>
    <circle cx="1200" cy="40" r="3"/><circle cx="1250" cy="40" r="3"/>
    <circle cx="950" cy="80" r="3"/><circle cx="1080" cy="70" r="3"/>
    <circle cx="1150" cy="100" r="3"/><circle cx="1000" cy="110" r="3"/>
    <circle cx="1200" cy="110" r="3"/><circle cx="1320" cy="110" r="3"/>
    <circle cx="1050" cy="140" r="3"/><circle cx="1300" cy="140" r="3"/>
    <circle cx="1150" cy="175" r="3"/><circle cx="1280" cy="175" r="3"/>
  </g>

  <!-- ═══ CIRCUIT TRACES LEFT SIDE ═══ -->
  <g stroke="#1a6b2a" stroke-width="1" fill="none" opacity="0.55" filter="url(#greenGlow)">
    <line x1="0" y1="160" x2="280" y2="160"/>
    <polyline points="40,160 40,130 90,130"/>
    <polyline points="120,160 120,140 200,140 200,120 260,120"/>
    <polyline points="180,160 180,175 250,175"/>
    <line x1="0" y1="185" x2="200" y2="185"/>
  </g>
  <g fill="#1a6b2a" opacity="0.65">
    <circle cx="40" cy="160" r="2.5"/><circle cx="120" cy="160" r="2.5"/>
    <circle cx="200" cy="140" r="2.5"/><circle cx="180" cy="175" r="2.5"/>
  </g>

  <!-- Aurebesh top right -->
  <text x="1050" y="28" font-family="monospace" font-size="13" fill="#2a9b3a" opacity="0.7" letter-spacing="3" filter="url(#greenGlow)">ᗑᐯ ↓ᐯᗑ</text>

  <!-- Aurebesh bottom left -->
  <text x="18" y="194" font-family="monospace" font-size="11" fill="#2a9b3a" opacity="0.6" letter-spacing="2" filter="url(#greenGlow)">ᗴᐯᐟIᐯᘔ</text>

  <!-- ═══ CIRCLE 1 — top left overlapping text ═══ -->
  <circle cx="310" cy="78" r="90" stroke="white" stroke-width="1.5" fill="none" opacity="0.55" filter="url(#circleGlow)"/>

  <!-- ═══ CIRCLE 2 — bottom right overlapping text ═══ -->
  <circle cx="770" cy="148" r="80" stroke="white" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#circleGlow)"/>

  <!-- ═══ KY TECH text — center ═══ -->
  <!-- Soft glow behind text -->
  <text x="700" y="130" text-anchor="middle"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="110" font-weight="900"
        fill="white" opacity="0.08"
        filter="url(#softGlow)">KY TECH</text>
  <!-- Main text -->
  <text x="700" y="130" text-anchor="middle"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="110" font-weight="900"
        fill="white"
        filter="url(#textGlow)"
        letter-spacing="6">KY TECH</text>

  <!-- Aurebesh subtitle below KY TECH -->
  <text x="700" y="170" text-anchor="middle"
        font-family="monospace"
        font-size="18" fill="white" opacity="0.6"
        letter-spacing="8">ᗑᐯ  ↓ᐯᗑᗑ</text>

  <!-- ═══ Diamond star bottom right ═══ -->
  <polygon points="1370,185 1376,192 1370,199 1364,192"
           fill="#aaa" opacity="0.6"/>

  <!-- Subtle horizontal accent line at bottom -->
  <line x1="0" y1="199" x2="1400" y2="199" stroke="#1a73c8" stroke-width="1.5" opacity="0.8"/>

  </g>
</svg>
